name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux:
    name: Linux (${{ matrix.distro }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro: [ubuntu, fedora]
        include:
          - distro: ubuntu
            dockerfile: Dockerfile.test
          - distro: fedora
            dockerfile: Dockerfile.fedora.test
    steps:
      - uses: actions/checkout@v6
      - name: Build and test
        run: docker build --network host -f ${{ matrix.dockerfile }} -t dotfiles-${{ matrix.distro }}-test .

  macos:
    name: macOS
    runs-on: macos-latest
    env:
      DOTFILES_CI: "1"
    steps:
      - uses: actions/checkout@v6
        with:
          path: .dotfiles

      - name: Prepare environment
        run: |
          mv "$GITHUB_WORKSPACE/.dotfiles" "$HOME/.dotfiles"
          rm -f "$HOME/.gitconfig"

      - name: Install
        run: bash ~/.dotfiles/scripts/install.sh

      - name: Validate
        run: bash ~/.dotfiles/scripts/test/validate.sh
