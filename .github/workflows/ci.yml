name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux:
    name: Linux (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and test
        run: docker build --network host -f Dockerfile.test -t dotfiles-test .

  macos:
    name: macOS
    runs-on: macos-latest
    env:
      DOTFILES_CI: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          path: .dotfiles

      - name: Prepare environment
        run: |
          mv "$GITHUB_WORKSPACE/.dotfiles" "$HOME/.dotfiles"
          rm -f "$HOME/.gitconfig"
          echo "SDKROOT=$(xcrun --show-sdk-path)" >> "$GITHUB_ENV"

      - name: Install
        env:
          MISE_VERBOSE: "1"
        run: bash ~/.dotfiles/scripts/install.sh

      - name: Validate
        run: bash ~/.dotfiles/scripts/test/validate.sh
