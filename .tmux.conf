# ── Prefix ──────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ─────────────────────────────────────────────────────
set -g mouse on
set -g escape-time 0
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g focus-events on
setw -g mode-keys vi

# ── True Color ──────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"

# ── Splits (preserve directory) ─────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane Navigation (prefix + arrow) ───────────────────────────
bind Left select-pane -L
bind Right select-pane -R
bind Up select-pane -U
bind Down select-pane -D

# ── Pane Resize (prefix + shift+arrow) ─────────────────────────
bind S-Left resize-pane -L 5
bind S-Right resize-pane -R 5
bind S-Up resize-pane -U 5
bind S-Down resize-pane -D 5

# ── Session ─────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Reloaded!"
bind X confirm-before -p "Kill session? (y/n)" kill-session

# ── Gruvbox Status Bar ──────────────────────────────────────────
set -g status-style "bg=#3c3836,fg=#ebdbb2"
set -g status-left-length 40
set -g status-right-length 90
set -g status-left "#[fg=#b8bb26,bold] #S "
set -g status-right "#[fg=#928374]%Y-%m-%d #[fg=#fabd2f]%H:%M "
set -g window-status-format "#[fg=#928374] #I:#W "
set -g window-status-current-format "#[fg=#fabd2f,bold] #I:#W "

# ── Pane Borders ────────────────────────────────────────────────
set -g pane-border-style "fg=#504945"
set -g pane-active-border-style "fg=#83a598"
